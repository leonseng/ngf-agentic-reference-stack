apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agent-chat
spec:
  parentRefs:
    - name: nginx-gateway-fabric
      sectionName: https-agent-chat
      namespace: nginx-gateway
  hostnames:
    - "agent-chat.lab.leonseng.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80
